name: Build sailfishos for dumpling

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      release:
        description: "SFOS release version"
        required: true
        default: "3.4.0.24"

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          source ./dumpling.env
          echo "RELEASE=${RELEASE}" >> $GITHUB_ENV
          echo "DEVICE=${DEVICE}" >> $GITHUB_ENV
          echo "PORT_ARCH=${PORT_ARCH}" >> $GITHUB_ENV

      - name: Set up Docker container
        run: |
          sudo docker pull coderus/sailfishos-platform-sdk-base:latest
          sudo docker run --privileged --name sailfish-sdk -d coderus/sailfishos-platform-sdk-base:latest tail -f /dev/null

      - name: Copy files into Docker container
        run: |
          sudo docker cp . sailfish-sdk:/workspace

      - name: Run build inside Docker
        run: |
          sudo docker exec sailfish-sdk sh -c "cd /workspace && sudo bash ./run-mic.sh"

      - name: List output files
        run: |
          sudo docker exec sailfish-sdk find /workspace/sfe-${{ env.DEVICE }}-${{ env.RELEASE }}/ -type f -name "*.zip" -o -name "*.md5sum" -o -name "*.sha1sum" -o -name "*.sha256sum" | sort

      - name: Archive artifacts
        run: |
          OUTPUT_DIR="/home/runner/work/${GITHUB_REPOSITORY#*/}/${GITHUB_REPOSITORY#*/}/artifacts"
          sudo mkdir -p "$OUTPUT_DIR"
          sudo docker exec sailfish-sdk sh -c "cd /workspace/sfe-${{ env.DEVICE }}-${{ env.RELEASE }}/ && ls *.zip 2>/dev/null" | while read f; do
            sudo docker cp "sailfish-sdk:/workspace/sfe-${{ env.DEVICE }}-${{ env.RELEASE }}/$f" "$OUTPUT_DIR/"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-dumpling-sailfishos
          path: /home/runner/work/**/artifacts/*.zip

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-checksums
          path: /home/runner/work/**/artifacts/*.md5sum
          if-no-files-found: ignore

      - name: Upload image to Release
        uses: ncipollo/release-action@main
        with:
          tag: SailfishOS_for_dumpling
          artifacts: /home/runner/work/**/artifacts/*.zip
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          sudo docker stop sailfish-sdk 2>/dev/null || true
          sudo docker rm sailfish-sdk 2>/dev/null || true