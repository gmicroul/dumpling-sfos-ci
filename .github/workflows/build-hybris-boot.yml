name: Build Hybris Boot Image

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'fajita'
      release:
        description: 'SailfishOS release version'
        required: true
        default: '5.0.0.73'
  push:
    branches: [ main, master ]
    paths:
      - 'dumpling-sfos-ci/**'
      - '.github/workflows/build-hybris-boot.yml'

env:
  DEVICE: ${{ github.event.inputs.device || 'fajita' }}
  RELEASE: ${{ github.event.inputs.release || '5.0.0.73' }}
  ANDROID_ROOT: /home/runner/work/android
  PLATFORM_SDK_ROOT: /srv/mer
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-hybris-boot:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          curl \
          unzip \
          build-essential \
          ccache \
          python3 \
          python3-pip \
          openjdk-8-jdk \
          repo \
          rsync \
          bc \
          bison \
          flex \
          g++-multilib \
          gcc-multilib \
          lib32ncurses5-dev \
          lib32z1-dev \
          libssl-dev \
          libxml2-utils \
          xsltproc \
          zip

    - name: Cache Android build
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          /home/runner/work/android/.repo
        key: android-${{ env.DEVICE }}-${{ github.sha }}
        restore-keys: |
          android-${{ env.DEVICE }}-

    - name: Setup Mer SDK
      run: |
        # Download and install Mer SDK
        wget -O mer-sdk-installer https://img.merproject.org/images/mer-sdk-install-latest-chroot
        chmod +x mer-sdk-installer
        sudo ./mer-sdk-installer -d /srv/mer -n

    - name: Clone Android source
      run: |
        mkdir -p $ANDROID_ROOT
        cd $ANDROID_ROOT

        # Initialize repo (adjust manifest URL as needed)
        repo init -u https://github.com/LineageOS/android.git -b lineage-17.1

        # Sync source (use partial sync to save time)
        repo sync -c -j4 --no-tags --no-clone-bundle --optimized-fetch --prune

    - name: Apply kernel patches for Docker support
      run: |
        cd $ANDROID_ROOT/kernel/oneplus/sdm845/

        # Backup original config
        cp arch/arm64/configs/fajita_defconfig arch/arm64/configs/fajita_defconfig.bak

        # Add Docker kernel options
        cat >> arch/arm64/configs/fajita_defconfig << 'EOF'

        # Docker support
        CONFIG_NAMESPACES=y
        CONFIG_UTS_NS=y
        CONFIG_IPC_NS=y
        CONFIG_PID_NS=y
        CONFIG_NET_NS=y
        CONFIG_USER_NS=y
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_PIDS=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CPUSETS=y
        CONFIG_CGROUP_CPUACCT=y
        CONFIG_MEMCG=y
        CONFIG_BLK_CGROUP=y
        CONFIG_OVERLAY_FS=y
        CONFIG_DM_THIN_PROVISIONING=y
        CONFIG_MD=y
        CONFIG_VETH=y
        CONFIG_BRIDGE=y
        CONFIG_NETFILTER=y
        CONFIG_NF_NAT=y
        CONFIG_NF_NAT_IPV4=y
        CONFIG_NF_NAT_IPV6=y
        CONFIG_IP_NF_IPTABLES=y
        CONFIG_IP6_NF_IPTABLES=y
        CONFIG_KEYS=y
        CONFIG_SECCOMP=y
        EOF

        # Show added config
        tail -30 arch/arm64/configs/fajita_defconfig

    - name: Build kernel
      run: |
        cd $ANDROID_ROOT

        # Setup build environment
        source build/envsetup.sh
        lunch ${{ env.DEVICE }}-userdebug

        # Build boot image
        make bootimage -j$(nproc)

    - name: Extract hybris-boot.img
      run: |
        cd $ANDROID_ROOT

        # Find boot image
        BOOT_IMG=$(find out/target/product/${{ env.DEVICE }} -name "boot.img" | head -1)

        if [ -z "$BOOT_IMG" ]; then
          echo "Error: boot.img not found"
          exit 1
        fi

        echo "Found boot image: $BOOT_IMG"

        # Copy to output directory
        mkdir -p output
        cp $BOOT_IMG output/hybris-boot.img

        # Get image info
        ls -lh output/hybris-boot.img
        file output/hybris-boot.img

    - name: Upload hybris-boot.img
      uses: actions/upload-artifact@v4
      with:
        name: hybris-boot-${{ env.DEVICE }}-${{ env.RELEASE }}
        path: output/hybris-boot.img
        retention-days: 30

    - name: Upload kernel config
      uses: actions/upload-artifact@v4
      with:
        name: kernel-config-${{ env.DEVICE }}
        path: ${{ env.ANDROID_ROOT }}/kernel/oneplus/sdm845/arch/arm64/configs/fajita_defconfig
        retention-days: 30

    - name: Generate build summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Device**: ${{ env.DEVICE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release**: ${{ env.RELEASE }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Kernel**: sdm845" >> $GITHUB_STEP_SUMMARY
        echo "- **Docker Support**: Enabled" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- hybris-boot.img" >> $GITHUB_STEP_SUMMARY
        echo "- kernel config" >> $GITHUB_STEP_SUMMARY
